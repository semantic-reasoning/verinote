# SPDX-License-Identifier: MPL-2.0
name: ci

# Lint + test every push to main and every pull request. ruff config lives in
# pyproject.toml ([tool.ruff]); the pytest suite is under tests/.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "0.15.18"   # keep in sync with local dev
          args: check

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      # Include the wirelog extra so pyrewire is present and the DuckDB/wirelog
      # parity tests in tests/test_engine.py actually run instead of being
      # importorskip'd — without it CI green-lights code it never executes.
      - run: pip install -e ".[test,wirelog]"
      - run: pytest -q
